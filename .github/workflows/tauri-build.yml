name: Build Tauri Applications

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Temporarily Hide Dynamic Folders for Static Export
        shell: pwsh
        run: |
          Rename-Item apps/web/app/api _api
          Rename-Item -LiteralPath "apps/web/app/[lang]/card/@modals" -NewName "_modals"

      - name: Build Next.js Static Export
        run: pnpm run build
        env:
          TAURI_BUILD: "true"
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build Card Application (Windows)
        run: |
          cd apps/card
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Build Frame Application (Windows)
        run: |
          cd apps/frame
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Build Timer Application (Windows)
        run: |
          cd apps/timer
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            apps/card/src-tauri/target/release/bundle/msi/*.msi
            apps/card/src-tauri/target/release/bundle/nsis/*.exe
            apps/frame/src-tauri/target/release/bundle/msi/*.msi
            apps/frame/src-tauri/target/release/bundle/nsis/*.exe
            apps/timer/src-tauri/target/release/bundle/msi/*.msi
            apps/timer/src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    name: Build Android App (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [card, frame, timer]
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: install NDK
        run: sdkmanager "ndk;28.2.13676358"

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Temporarily Hide Dynamic Folders for Static Export
        shell: pwsh
        run: |
          Rename-Item apps/web/app/api _api
          Rename-Item -LiteralPath "apps/web/app/[lang]/card/@modals" -NewName "_modals"

      - name: Build Next.js Static Export
        run: pnpm run build
        env:
          TAURI_BUILD: "true"
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build Application (Android)
        working-directory: apps/${{ matrix.app }}/src-tauri
        run: |
          pnpm tauri android init
          pnpm tauri android build
          ./gen/android/gradlew --stop || true
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.app }}
          path: apps/${{ matrix.app }}/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
