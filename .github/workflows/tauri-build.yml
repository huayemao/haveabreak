name: Build Tauri Applications

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Temporarily Hide Dynamic Folders for Static Export
        shell: pwsh
        run: |
          Rename-Item app/api _api
          Rename-Item -LiteralPath "app/[lang]/card/@modals" -NewName "_modals"

      - name: Build Next.js Static Export
        run: pnpm run build
        env:
          TAURI_BUILD: "true"
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build Card Application (Windows)
        run: |
          cd apps/card
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Build Frame Application (Windows)
        run: |
          cd apps/frame
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Build Timer Application (Windows)
        run: |
          cd apps/timer
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            apps/card/src-tauri/target/release/bundle/msi/*.msi
            apps/card/src-tauri/target/release/bundle/nsis/*.exe
            apps/frame/src-tauri/target/release/bundle/msi/*.msi
            apps/frame/src-tauri/target/release/bundle/nsis/*.exe
            apps/timer/src-tauri/target/release/bundle/msi/*.msi
            apps/timer/src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        
      - name: install NDK
        run: sdkmanager "ndk;28.2.13676358"
    

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      # - name: Cache Cargo Dependencies
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.cargo/bin/
      #       ~/.cargo/registry/index/
      #       ~/.cargo/registry/cache/
      #       ~/.cargo/git/db/
      #       apps/card/src-tauri/target/
      #       apps/frame/src-tauri/target/
      #       apps/timer/src-tauri/target/
      #     key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.toml') }}
      #     restore-keys: |
      #       ${{ runner.os }}-cargo-android-

      - name: Temporarily Hide Dynamic Folders for Static Export
        shell: pwsh
        run: |
          Rename-Item app/api _api
          Rename-Item -LiteralPath "app/[lang]/card/@modals" -NewName "_modals"

      - name: Build Next.js Static Export
        run: pnpm run build
        env:
          TAURI_BUILD: "true"
          NEXT_TELEMETRY_DISABLED: 1

      # Note: We dropped 'tauri android init' as it should already be configured in your source control.
      # If your gen/android folders are not committed, keep init but run it cleanly.
      - name: Build Card Application (Android)
        working-directory: apps/card/src-tauri
        run: |
          pnpm tauri:card android init
          pnpm tauri:card android build
          ./gen/android/gradlew --stop || true
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358

      - name: Build Frame Application (Android)
        working-directory: apps/frame/src-tauri
        run: |
          pnpm tauri:frame android init
          pnpm tauri:frame android build
          ./gen/android/gradlew --stop || true
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358

      - name: Build Timer Application (Android)
        working-directory: apps/timer/src-tauri
        run: |
          pnpm tauri:timer android init
          pnpm tauri:timer android build
          ./gen/android/gradlew --stop || true
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            apps/card/src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            apps/frame/src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            apps/timer/src-tauri/gen/android/app/build/outputs/apk/release/*.apk
