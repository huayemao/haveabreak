name: Build Tauri Applications

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  get-release:
    name: Get Release Information
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.get-release-info.outputs.release_id }}
      release_tag: ${{ steps.get-release-info.outputs.release_tag }}
      release_version: ${{ steps.get-release-notes.outputs.release_version }}
      release_note: ${{ steps.get-release-notes.outputs.release_note }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Release Info
        id: get-release-info
        uses: actions/github-script@v7
        with:
          script: |
            let releaseId, releaseTag;
            if (context.eventName === 'release') {
              releaseId = context.payload.release.id;
              releaseTag = context.payload.release.tag_name;
            } else {
              const ref = context.ref;
              releaseTag = ref.replace('refs/tags/', '');
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: releaseTag
              });
              releaseId = release.data.id;
            }
            core.setOutput('release_id', releaseId);
            core.setOutput('release_tag', releaseTag);

      - name: Get Release Notes
        id: get-release-notes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = require('./package.json').version;
            const releaseNotesFileContent = fs.readFileSync('./release-notes.json', 'utf8');
            const releaseNotes = JSON.parse(releaseNotesFileContent).releases[version] || {};
            const notes = releaseNotes.notes || [];
            const releaseNote = notes.map((note, index) => `${index + 1}. ${note}`).join('\n');
            console.log('Version:', version);
            console.log('Formatted release note:', releaseNote);
            core.setOutput('release_version', version);
            core.setOutput('release_note', releaseNote);

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: get-release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Temporarily Hide Dynamic Folders for Static Export
        shell: pwsh
        run: |
          Rename-Item apps/web/app/api _api
          Rename-Item -LiteralPath "apps/web/app/[lang]/card/@modals" -NewName "_modals"

      - name: Build Next.js Static Export
        run: pnpm run build
        env:
          TAURI_BUILD: "true"
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build Card Application (Windows)
        run: |
          cd apps/card
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Build Frame Application (Windows)
        run: |
          cd apps/frame
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            apps/card/src-tauri/target/release/bundle/msi/*.msi
            apps/card/src-tauri/target/release/bundle/nsis/*.exe
            apps/frame/src-tauri/target/release/bundle/msi/*.msi
            apps/frame/src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    name: Build Android App (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: get-release
    strategy:
      matrix:
        app: [card, frame]
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: install NDK
        run: sdkmanager "ndk;28.2.13676358"

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Temporarily Hide Dynamic Folders for Static Export
        shell: pwsh
        run: |
          Rename-Item apps/web/app/api _api
          Rename-Item -LiteralPath "apps/web/app/[lang]/card/@modals" -NewName "_modals"

      - name: Build Next.js Static Export
        run: pnpm run build
        env:
          TAURI_BUILD: "true"
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build Application (Android)
        working-directory: apps/${{ matrix.app }}/src-tauri
        run: |
          pnpm install
          pnpm tauri android init
          git checkout .
          if [ -d "icons/android" ]; then
            cp -r icons/android/* gen/android/app/src/main/res/
            echo "Custom Android icons copied successfully"
          fi
          pushd gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties
          popd
          pnpm tauri android build
          ./gen/android/gradlew --stop || true
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.app }}
          path: |
            apps/${{ matrix.app }}/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            apps/${{ matrix.app }}/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.sig

  build-ios:
    name: Build iOS App (${{ matrix.app }})
    runs-on: macos-latest
    needs: get-release
    strategy:
      matrix:
        app: [card, frame, timer]
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Install macOS System Dependencies
        run: |
          brew install cmake

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/${{ matrix.app }}/src-tauri/target/
          key: ${{ runner.os }}-cargo-ios-${{ matrix.app }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-${{ matrix.app }}-
            ${{ runner.os }}-cargo-ios-

      - name: Temporarily Hide Dynamic Folders for Static Export
        shell: bash
        run: |
          mv apps/web/app/api apps/web/app/_api
          mv "apps/web/app/[lang]/card/@modals" "apps/web/app/[lang]/card/_modals"

      - name: Build Next.js Static Export
        run: pnpm run build
        env:
          TAURI_BUILD: "true"
          NEXT_TELEMETRY_DISABLED: 1

      - name: Generate App Icons
        working-directory: apps/${{ matrix.app }}/src-tauri
        run: |
          npx tauri icon ../../web/public/${{ matrix.app }}/icon.png

      - name: Build Application (iOS)
        working-directory: apps/${{ matrix.app }}/src-tauri
        run: |
          pnpm install
          export CODE_SIGN_IDENTITY=""
          export CODE_SIGNING_REQUIRED="NO"
          export CODE_SIGNING_ALLOWED="NO"
          pnpm tauri ios init
          git checkout .
          pnpm tauri ios build --no-sign
        env:
          CI: true
          APPLE_DEVELOPMENT_TEAM: "12345ABCDE"
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ matrix.app }}
          path: |
            apps/${{ matrix.app }}/src-tauri/gen/apple/build/*/*.ipa

  update-release:
    name: Update Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [get-release, build-windows, build-android, build-ios]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename APK files to avoid overwriting
        shell: bash
        run: |
          mv artifacts/android-apk-card/app-universal-release.apk artifacts/android-apk-card/haveabreak-card.apk
          mv artifacts/android-apk-frame/app-universal-release.apk artifacts/android-apk-frame/haveabreak-frame.apk

      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-release.outputs.release_tag }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.apk
            artifacts/**/*.sig
            artifacts/**/*.ipa
          append_body: true
          body: |
            ## Downloads
            
            ### Windows
            - [Card (Installer)](https://github.com/${{ github.repository }}/releases/download/${{ needs.get-release.outputs.release_tag }}/windows-binaries/card/src-tauri/target/release/bundle/msi/haveabreak-card_0.1.0_x64_en-US.msi)
            - [Card (Portable)](https://github.com/${{ github.repository }}/releases/download/${{ needs.get-release.outputs.release_tag }}/windows-binaries/card/src-tauri/target/release/bundle/nsis/haveabreak-card_0.1.0_x64-setup.exe)
            - [Frame (Installer)](https://github.com/${{ github.repository }}/releases/download/${{ needs.get-release.outputs.release_tag }}/windows-binaries/frame/src-tauri/target/release/bundle/msi/haveabreak-frame_0.1.0_x64_en-US.msi)
            - [Frame (Portable)](https://github.com/${{ github.repository }}/releases/download/${{ needs.get-release.outputs.release_tag }}/windows-binaries/frame/src-tauri/target/release/bundle/nsis/haveabreak-frame_0.1.0_x64-setup.exe)
            
            ### Android
            - [Card APK](https://github.com/${{ github.repository }}/releases/download/${{ needs.get-release.outputs.release_tag }}/android-apk-card/haveabreak-card.apk)
            - [Frame APK](https://github.com/${{ github.repository }}/releases/download/${{ needs.get-release.outputs.release_tag }}/android-apk-frame/haveabreak-frame.apk)
            
            ### iOS
            - [Card IPA](https://github.com/${{ github.repository }}/releases/download/${{ needs.get-release.outputs.release_tag }}/ios-ipa-card/arm64/haveabreak-card.ipa)
            - [Frame IPA](https://github.com/${{ github.repository }}/releases/download/${{ needs.get-release.outputs.release_tag }}/ios-ipa-frame/arm64/haveabreak-frame.ipa)

      - name: Update Release Body with Notes
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.get-release.outputs.release_id }}
          release_tag: ${{ needs.get-release.outputs.release_tag }}
          release_note: ${{ needs.get-release.outputs.release_note }}
          release_version: ${{ needs.get-release.outputs.release_version }}
        with:
          script: |
            const notes = process.env.release_note.split(/\d+\.\s/).filter(Boolean);
            const formattedNotes = notes.map(note => `* ${note.trim()}`).join("\n");
            
            let body = `## Release Highlights (v${process.env.release_version})\n\n`;
            body += `${formattedNotes}\n\n`;
            body += `## Downloads\n\n`;
            body += `### Windows\n`;
            body += `- [Card (Installer)](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${process.env.release_tag}/windows-binaries/card/src-tauri/target/release/bundle/msi/haveabreak-card_0.1.0_x64_en-US.msi)\n`;
            body += `- [Card (Portable)](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${process.env.release_tag}/windows-binaries/card/src-tauri/target/release/bundle/nsis/haveabreak-card_0.1.0_x64-setup.exe)\n`;
            body += `- [Frame (Installer)](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${process.env.release_tag}/windows-binaries/frame/src-tauri/target/release/bundle/msi/haveabreak-frame_0.1.0_x64_en-US.msi)\n`;
            body += `- [Frame (Portable)](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${process.env.release_tag}/windows-binaries/frame/src-tauri/target/release/bundle/nsis/haveabreak-frame_0.1.0_x64-setup.exe)\n\n`;
            body += `### Android\n`;
            body += `- [Card APK](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${process.env.release_tag}/android-apk-card/haveabreak-card.apk)\n`;
            body += `- [Frame APK](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${process.env.release_tag}/android-apk-frame/haveabreak-frame.apk)\n\n`;
            body += `### iOS\n`;
            body += `- [Card IPA](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${process.env.release_tag}/ios-ipa-card/arm64/haveabreak-card.ipa)\n`;
            body += `- [Frame IPA](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${process.env.release_tag}/ios-ipa-frame/arm64/haveabreak-frame.ipa)\n`;
            
            console.log('Release body:', body);
            
            github.rest.repos.updateRelease({ 
              owner: context.repo.owner, 
              repo: context.repo.repo, 
              release_id: parseInt(process.env.release_id), 
              body: body, 
              draft: false, 
              prerelease: false 
            });
